# dataset
base_name: base_caueeg
dataset_type: caueeg
# dataset_path: ../Datasets/caueeg-dataset/caueeg-dataset/
file_format: feather
crop_multiple: 1
test_crop_multiple: 8
crop_timing_analysis: false
load_event: false
num_electrodes: 21

# preprocessing
seq_length: 2000  # 200Hz * 10s = 2000 for base
latency: 2000
signal_length_limit: 10000000  # A sufficiently large number for no effect
EKG: X
photic: X
input_norm: dataset

# augmentation
awgn: 0.001
awgn_age: 0.001
mgn: 0.001
